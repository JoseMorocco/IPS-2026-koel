name: Deploy Koel to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: leonhatches/koel-app:latest
          no-cache: true

      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e

            cd /home/ubuntu/IPS-2026-koel

            echo "Sincronizando con master desde GitHub..."
            git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/JoseMorocco/IPS-2026-koel.git" master
            git reset --hard FETCH_HEAD

            echo "Descargando imagen actualizada de Docker Hub..."
            docker compose pull

            echo "Levantando contenedores actualizados..."
            docker compose up -d

            echo "Limpiando imágenes Docker no utilizadas..."
            docker image prune -f

            echo "Deployment completado exitosamente."